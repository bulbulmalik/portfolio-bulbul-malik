<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf8f4"/>
      <stop offset="100%" stop-color="#efe5df"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)" rx="28" />
  <rect x="80" y="80" width="1040" height="540" rx="22" fill="#fff" stroke="#d8cec4" stroke-width="2" />
  <rect x="110" y="120" width="980" height="80" rx="16" fill="#6b121f" />
  <text x="140" y="170" font-family="DM Sans, sans-serif" font-size="36" fill="#faf8f4">RAG Knowledge Base Demo</text>
  <rect x="110" y="230" width="540" height="58" rx="12" fill="#f2e8e2" />
  <text x="130" y="268" font-family="DM Sans, sans-serif" font-size="22" fill="#1a1510">Search existing documents and generate answers.</text>
  <rect x="110" y="310" width="980" height="240" rx="16" fill="#fdf8f3" stroke="#ece2d8" stroke-width="1" />
  <text x="140" y="360" font-family="DM Sans, sans-serif" font-size="20" fill="#1a1510">User query:</text>
  <rect x="140" y="380" width="760" height="60" rx="14" fill="#fff" stroke="#d8cec4" stroke-width="1" />
  <text x="160" y="422" font-family="DM Sans, sans-serif" font-size="18" fill="#6b121f">How do you retrieve the best answer?</text>
  <rect x="140" y="460" width="760" height="180" rx="16" fill="#fff9f5" stroke="#d8cec4" stroke-width="1" />
  <text x="160" y="500" font-family="DM Sans, sans-serif" font-size="18" fill="#1a1510">Answer:</text>
  <text x="160" y="530" font-family="DM Sans, sans-serif" font-size="16" fill="#4a4035">The system encodes both queries and documents, retrieves the most</text>
  <text x="160" y="560" font-family="DM Sans, sans-serif" font-size="16" fill="#4a4035">relevant passages, then uses the generation model to answer
  based on that retrieved context.</text>
</svg>
